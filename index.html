      const BLOCK_COLORS = { event: { bg: 'bg-pink-100 border-pink-400', text: 'text-pink-900', bar: 'bg-pink-500' }, morning: { bg: 'bg-yellow-100 border-yellow-400', text: 'text-yellow-900', bar: 'bg-yellow-500' }, p1: { bg: 'bg-blue-100 border-blue-400', text: 'text-blue-900', bar: 'bg-blue-500' }, p2: { bg: 'bg-blue-100 border-blue-400', text: 'text-blue-900', bar: 'bg-blue-500' }, p3: { bg: 'bg-sky-100 border-sky-400', text: 'text-sky-900', bar: 'bg-sky-500' }, p4: { bg: 'bg-sky-100 border-sky-400', text: 'text-sky-900', bar: 'bg-sky-500' }, lunch: { bg: 'bg-amber-100 border-amber-400', text: 'text-amber-900', bar: 'bg-amber-500' }, p5: { bg: 'bg-purple-100 border-purple-400', text: 'text-purple-900', bar: 'bg-purple-500' }, p6: { bg: 'bg-purple-100 border-purple-400', text: 'text-purple-900', bar: 'bg-purple-500' }, afterschool: { bg: 'bg-teal-100 border-teal-400', text: 'text-teal-900', bar: 'bg-teal-500' } };

      const handleSaveNote = () => { if(!editingNote.title.trim()&&!editingNote.content.trim()){ setEditingNote(null); return; } if(editingNote.type==='diary'){ const wk=`${editingNote.dateStr}-diary`; const nd={...weeklyData,[wk]:{...(weeklyData[wk]||{}),memo:editingNote.content,useTemplate:false}}; setWeeklyData(nd); saveAll(baseTemplate,templateSettings,nd,weeklySettings); showToast('メモを更新しました'); } else { const isN=!notesData.some(n=>n.id===editingNote.id); const ts=Date.now(); const nn=isN?[{...editingNote,type:'note',updatedAt:ts},...notesData]:notesData.map(n=>n.id===editingNote.id?{...editingNote,updatedAt:ts}:n); saveNotes(nn); showToast('ノートを保存しました'); } setEditingNote(null); };
      const shareNoteText = async(n) => { const dStr = new Date(n.updatedAt || Date.now()).toLocaleDateString('ja-JP'); const t = `■ ${n.title||'無題'}\n(${dStr})\n\n${n.content||''}`; try{ if(navigator.share){await navigator.share({title:n.title||'EduPlanner',text:t});showToast('共有しました');return;}}catch(e){if(e.name!=='AbortError')console.error(e);} try{await navigator.clipboard.writeText(t);showToast('📋 コピーしました');}catch(e){showToast('コピーに失敗しました');} };
      const copyTodosToClipboard = () => { const pending = todos.filter(t => !t.completed); if (!pending.length) { showToast('未完了のタスクがありません'); return; } const text = pending.map(t => { let line = t.important ? `⭐ ${t.text}` : t.text; if (t.dueDate) line += ` (期限: ${t.dueDate})`; return line; }).join('\n'); const textArea = document.createElement("textarea"); textArea.value = text; document.body.appendChild(textArea); textArea.select(); try { document.execCommand('copy'); showToast('📋 TODOをコピーしました！'); } catch (err) { showToast('コピーに失敗しました。'); } document.body.removeChild(textArea); };

      const sortedIncompleteTodos = todos.filter(t => !t.completed).sort((a,b) => {
        if (a.dueDate && b.dueDate) { if (a.dueDate !== b.dueDate) return a.dueDate.localeCompare(b.dueDate); }
        else if (a.dueDate && !b.dueDate) { return -1; }
        else if (!a.dueDate && b.dueDate) { return 1; }
        if (a.important && !b.important) return -1;
        if (!a.important && b.important) return 1;
        return b.id - a.id; 
      });

      const combinedNotes = useMemo(() => { const c=[...notesData.map(n=>({...n,type:'note'}))]; Object.keys(weeklyData).forEach(k=>{if(k.endsWith('-diary')){const ds=k.replace('-diary','');const d=weeklyData[k];if(d?.memo?.trim())c.push({id:`diary-${ds}`,type:'diary',title:`${new Date(ds).getMonth()+1}月${new Date(ds).getDate()}日のメモ`,content:d.memo,updatedAt:new Date(ds).getTime()+86399000,dateStr:ds});}}); return c.sort((a,b)=>b.updatedAt-a.updatedAt); }, [notesData, weeklyData]);

      const addTodo = (e) => { e.preventDefault(); if(!newTodoText.trim()) return; saveTodos([...todos,{id:Date.now(),text:newTodoText,completed:false,dueDate:newTodoDate,tag:newTodoTag,important:newTodoImportant}]); setNewTodoText(''); };
      
      const clearHandwriting = () => { if(canvasRef.current){ const ctx=canvasRef.current.getContext('2d'); ctx.clearRect(0,0,800,600); ctx.fillStyle='white'; ctx.fillRect(0,0,800,600); } };
      const saveHandwriting = () => { const du=canvasRef.current.toDataURL(); if(handwritingMode==='quick') saveQuickMemos([{id:Date.now(),dataUrl:du,timestamp:new Date().toISOString()},...quickMemos]); else setTempHandwriting(du); setShowHandwritingPad(false); };
      const startDrawing = (e) => { const r=canvasRef.current.getBoundingClientRect(); const ctx=canvasRef.current.getContext('2d'); ctx.beginPath(); ctx.moveTo(e.clientX-r.left,e.clientY-r.top); setIsDrawing(true); };
      const draw = (e) => { if(!isDrawing) return; const r=canvasRef.current.getBoundingClientRect(); const ctx=canvasRef.current.getContext('2d'); ctx.lineTo(e.clientX-r.left,e.clientY-r.top); ctx.stroke(); };
      const endDrawing = () => { setIsDrawing(false); };

      const shareMemo = async (dataUrl) => {
        try {

      const getDailyEvents = (ds, di) => { const evs=[]; const [y,m,d]=ds.split('-').map(Number); const hol=getHolidayName(y,m,d); if(hol) evs.push({type:'holiday',text:hol}); todos.filter(t=>!t.completed&&t.dueDate===ds).forEach(t=>evs.push({type:'todo',text:t.text})); const ed=getCellData(ds,'event',di); if(ed?.subject) evs.push({type:'event',text:ed.subject}); return evs; };
      const getCalendarDays = () => { const y=currentMonth.getFullYear(); const m=currentMonth.getMonth(); const fd=new Date(y,m,1); const ld=new Date(y,m+1,0); let fdi=fd.getDay()-1; if(fdi===-1) fdi=6; const days=[]; for(let i=fdi-1;i>=0;i--) days.push({date:new Date(y,m-1,new Date(y,m,0).getDate()-i),isCurrentMonth:false}); for(let i=1;i<=ld.getDate();i++) days.push({date:new Date(y,m,i),isCurrentMonth:true}); while(days.length<42) days.push({date:new Date(y,m+1,days.length-ld.getDate()-fdi+1),isCurrentMonth:false}); return days; };

                      return (

                </div>
              </div>
            </form>
          </aside>

          {editingCell && (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
              <div className="bg-white w-full max-w-lg rounded-[2rem] shadow-2xl p-6 sm:p-8 flex flex-col anim-scale-in">
                <div className="flex justify-between items-center mb-6">
                  <div>
                    <div className="text-sm font-bold text-slate-500 mb-1">{editingCell.dateStr} ({editingCell.dayName}曜) {editingCell.isTemplate?'※基本設定':''}</div>
                    <h2 className="text-2xl font-black text-slate-800">{editingCell.periodName}の編集</h2>
                  </div>
                </div>
                
                {editingCell.periodId === 'afterschool' ? (
                  <div className="space-y-4 max-h-[50vh] overflow-y-auto hide-scrollbar pr-2 bg-slate-50 p-3 rounded-2xl border border-slate-300 shadow-inner">
                    {tempEvents.map((ev,idx) => (
                      <div key={idx} className="bg-white p-4 rounded-xl border border-slate-400 shadow-sm focus-within:border-blue-500 focus-within:ring-2 focus-within:ring-blue-100 transition-all">
                        <div className="flex gap-2 items-center mb-3">
                          <input type="time" value={ev.startTime} onChange={e=>updateTempEvent(idx,'startTime',e.target.value)} className="w-28 bg-slate-50 border border-slate-300 rounded-lg px-3 py-2 text-sm font-mono font-bold outline-none focus:border-blue-500" />
                          <span className="text-slate-400 font-bold">〜</span>
                          <input type="time" value={ev.endTime} onChange={e=>updateTempEvent(idx,'endTime',e.target.value)} className="w-28 bg-slate-50 border border-slate-300 rounded-lg px-3 py-2 text-sm font-mono font-bold outline-none focus:border-blue-500" />
                        </div>
                        <input type="text" placeholder="予定・活動" value={ev.subject} onChange={e=>updateTempEvent(idx,'subject',e.target.value)} className="w-full font-black text-lg border-b-[3px] border-slate-200 focus:border-blue-500 outline-none py-2 bg-transparent text-slate-800 placeholder-slate-400 transition-colors" />
                      </div>
                    ))}
                  </div>
                ) : (
                  <div className="space-y-5">
                    {editingCell.periodId!=='event'&&editingCell.periodId!=='diary'&&(
                      <div className="flex gap-2 items-center">
                        <input type="time" value={tempStartTime} onChange={e=>setTempStartTime(e.target.value)} className="w-28 bg-white border border-slate-400 rounded-lg px-3 py-2 text-sm font-mono font-bold outline-none focus:border-blue-500 shadow-sm" />
                        <span className="text-slate-400 font-bold">〜</span>
                        <input type="time" value={tempEndTime} onChange={e=>setTempEndTime(e.target.value)} className="w-28 bg-white border border-slate-400 rounded-lg px-3 py-2 text-sm font-mono font-bold outline-none focus:border-blue-500 shadow-sm" />
                      </div>
                    )}
                    <input value={tempSubject} onChange={e=>setTempSubject(e.target.value)} className="w-full text-2xl font-black p-3 border-b-[3px] border-slate-300 outline-none focus:border-blue-600 bg-transparent text-slate-800 placeholder-slate-400 transition-colors" placeholder="活動内容・教科名" autoFocus />
                    
                    {!editingCell.isTemplate && editingCell.periodId.startsWith('p') && syllabusData.length > 0 && (
                      <div className="bg-blue-50/50 p-3 rounded-xl border border-blue-200 max-h-40 overflow-y-auto hide-scrollbar space-y-2 shadow-inner">
                        <div className="text-[11px] font-black text-blue-800 mb-2">💡 進度からワンタップ入力</div>
                        {syllabusData.map(subj => {
                          if(subj.type==='auto') {
                            const unit=subj.units?.[subj.currentUnitIdx]; const isFinished=subj.units?.length>0&&!unit;
                            const text=isFinished?`${subj.name}（終了）`:(unit?`${subj.name}（${unit.name} ${subj.currentHour}/${unit.hours}）`:subj.name);
                            return (
                              <div key={subj.id} className="flex gap-2">
                                <button type="button" onClick={()=>setTempSubject(text)} className="flex-1 bg-white text-blue-900 text-sm font-bold py-2 px-3 rounded-lg border border-blue-300 shadow-sm text-left truncate active:scale-95">{text}</button>
                              </div>
                            );
                          } else {
                            return (
                              <div key={subj.id}>
                                <button type="button" onClick={()=>setTempSubject(subj.name)} className="w-full bg-white text-teal-900 text-sm font-bold py-2 px-3 rounded-lg border border-teal-300 shadow-sm text-left active:scale-95">{subj.name}</button>
                              </div>
                            );
                          }
                        })}
                      </div>
                    )}
                    <textarea value={tempMemo} onChange={e=>setTempMemo(e.target.value)} className="w-full h-28 p-4 bg-white border border-slate-400 rounded-xl outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 text-sm font-bold text-slate-800 shadow-sm placeholder-slate-400" placeholder="詳細メモ..." />
                  </div>
                )}
                
                <div className="flex justify-between mt-8 pt-5 border-t border-slate-200">
                  <button onClick={()=>{handleSaveCell({subject:'',memo:'',startTime:'',endTime:'',events:[]}); showToast('🧹 クリアしました');}} className="px-5 py-3 bg-rose-50 border border-rose-200 text-rose-600 rounded-xl font-bold text-sm shadow-sm active:scale-95 transition-colors hover:bg-rose-100">クリア</button>
                  <div className="flex gap-3">
                    <button onClick={()=>setEditingCell(null)} className="px-6 py-3 bg-slate-100 text-slate-700 border border-slate-300 rounded-xl font-bold text-sm shadow-sm hover:bg-slate-200 transition-colors">キャンセル</button>
                    <button onClick={()=>{const data={subject:tempSubject,memo:tempMemo,startTime:tempStartTime,endTime:tempEndTime,handwriting:tempHandwriting}; if(editingCell.periodId==='afterschool') data.events=tempEvents.filter(ev=>ev.subject.trim()!==''); handleSaveCell(data);}} className="px-8 py-3 bg-blue-600 text-white rounded-xl font-black text-base shadow-md active:scale-95 transition-transform hover:bg-blue-700">保存する</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* 手書きパッド */}
          {showHandwritingPad && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur z-[120] flex flex-col p-4 sm:p-8">
              <div className="flex-1 bg-white rounded-[2rem] flex flex-col overflow-hidden shadow-2xl">
                <div className="p-4 border-b bg-slate-50 flex justify-between items-center"><h2 className="font-black text-lg">✏️ 手書き入力</h2><div className="flex gap-2"><button onClick={clearHandwriting} className="px-4 py-2 bg-white rounded-lg border font-bold text-sm">消去</button><button onClick={saveHandwriting} className="px-6 py-2 bg-blue-600 text-white rounded-lg font-bold text-sm">決定</button></div></div>
                <div className="flex-1 bg-slate-200 p-4 flex items-center justify-center touch-none"><canvas ref={canvasRef} width={800} height={600} className="bg-white rounded-xl shadow-lg border max-w-full max-h-full object-contain touch-none" onPointerDown={startDrawing} onPointerMove={draw} onPointerUp={endDrawing} onPointerCancel={endDrawing} onPointerOut={endDrawing} style={{touchAction:'none'}}/></div>
              </div>
            </div>
          )}

          {selectedDateDetails && (
            <DayTimelineView dateStr={selectedDateDetails.dateStr} dateObj={selectedDateDetails.dateObj} onClose={() => setSelectedDateDetails(null)} getCellData={getCellData} getDaySetting={getDaySetting} todos={todos} onGoToWeekly={() => { setCurrentWeekStart(getMonday(selectedDateDetails.dateObj)); setActiveTab('weekly'); setSelectedDateDetails(null); }} />
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<TeacherPlanner />);
  </script>
</body>
</html>
