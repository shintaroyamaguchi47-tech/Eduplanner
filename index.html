  <style>
    :root {
      --ink: #1e293b;

      --paper-warm: #f5f0eb;

      --accent-light: #dbeafe;

      --rose-light: #fff1f2;
      --amber: #d97706;
      --amber-light: #fffbeb;
      --teal: #0d9488;
      --teal-light: #f0fdfa;
      --radius: 14px;
      --radius-lg: 22px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
    }
    body { 
      font-family: 'Zen Maru Gothic', sans-serif; 
      -webkit-tap-highlight-color: transparent; 
      background-color: var(--paper);
      color: var(--ink);
      letter-spacing: 0.02em;
    }
    .font-mono { font-family: 'IBM Plex Mono', monospace; }
    .smooth-scroll { -webkit-overflow-scrolling: touch; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    
    .glass { background: rgba(255,255,255,0.72); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
    :root { --event-row-h: 1.5rem; }
    @media (min-width: 640px) { :root { --event-row-h: 1.75rem; } }
    @media (min-width: 1024px) { :root { --event-row-h: 2rem; } }
    
    @keyframes fadeUp { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity:0; transform: scale(0.95); } to { opacity:1; transform: scale(1); } }
    @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
    @keyframes pulse-dot { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    .anim-fade-up { animation: fadeUp 0.4s ease-out both; }
    .anim-scale-in { animation: scaleIn 0.3s ease-out both; }
    .anim-slide-right { animation: slideInRight 0.35s ease-out both; }
    .pulse-dot { animation: pulse-dot 2s ease-in-out infinite; }

    /* 印刷用CSS */
    @media print {
      body { background: white !important; font-size: 10pt; }
      .no-print, header, .glass, aside, [class*="fixed"] { display: none !important; }
      .print-only { display: block !important; }
      .print-table { page-break-inside: avoid; }
      .print-table td, .print-table th { border: 1px solid #333 !important; padding: 4px 6px !important; font-size: 9pt; }
    }
    .print-only { display: none; }

    /* Card hover lift */
    .card-lift { transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .card-lift:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    
    /* Today indicator pulse */
    @keyframes today-pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(225,29,72,0.3); }
      50% { box-shadow: 0 0 0 6px rgba(225,29,72,0); }
    }
    .today-ring { animation: today-pulse 2.5s ease-in-out infinite; }
  </style>
</head>

    const formatUnits = (units) => units ? units.map(u => `${u.name},${u.hours}`).join('\n') : '';

    const DayTimelineView = ({ dateStr, dateObj, onClose, getCellData, getDaySetting, todos, onGoToWeekly }) => {
      let dayIdx = dateObj.getDay() - 1; if (dayIdx === -1) dayIdx = 6;
      const setting = getDaySetting(dateStr, dayIdx);
      const isHoliday = setting.type === 'holiday';

      const START_HOUR = 8;
      const END_HOUR = 18;
      const TOTAL_HEIGHT = (END_HOUR - START_HOUR) * HOUR_HEIGHT;

        return ((h - START_HOUR) * 60 + m) / 60 * HOUR_HEIGHT;
      };

        event: { bg: 'bg-pink-100 border-pink-300', text: 'text-pink-800', bar: 'bg-pink-400' },

      };

      // 全ての予定ブロックを収集
      const blocks = [];
      const times = SCHEDULE_TIMES[setting.type];
      
      ROWS.filter(r => r.id !== 'diary').forEach(row => {

        if (row.id === 'afterschool' && data.events?.length > 0) {
          data.events.forEach((ev, idx) => {
            if (ev.subject) {
              const st = ev.startTime || (times?.afterschool?.start) || '';

              if (st) blocks.push({ id: `${row.id}-${idx}`, periodId: row.id, periodName: row.name, subject: ev.subject, memo: ev.memo || '', startTime: st, endTime: et || st.replace(/:\d+$/, m => `:${(parseInt(m.slice(1))+45)%60}`), color: BLOCK_COLORS.afterschool });

            if (!et) { const [h, m] = st.split(':').map(Number); et = `${String(h).padStart(2,'0')}:${String(m+45).padStart(2,'0')}`; }
            blocks.push({ id: row.id, periodId: row.id, periodName: row.name, subject: data.subject, memo: data.memo || '', startTime: st, endTime: et, color: BLOCK_COLORS[row.id] || BLOCK_COLORS.p1 });
          }

                {/* 時間軸のグリッド線 */}
                {Array.from({ length: END_HOUR - START_HOUR + 1 }, (_, i) => START_HOUR + i).map(h => (
                  <div key={h} className="absolute left-0 right-0 flex items-start" style={{ top: (h - START_HOUR) * HOUR_HEIGHT + 'px' }}>
                    <div className="w-12 shrink-0 text-right pr-2 text-[10px] font-mono font-bold text-slate-400 -mt-1.5">{h}:00</div>
                    <div className="flex-1 border-t border-slate-200/60 h-0"></div>
                  </div>
                ))}
                {/* 30分線 */}
                {Array.from({ length: END_HOUR - START_HOUR }, (_, i) => START_HOUR + i).map(h => (
                  <div key={`half-${h}`} className="absolute left-12 right-0" style={{ top: (h - START_HOUR) * HOUR_HEIGHT + HOUR_HEIGHT / 2 + 'px' }}>

                {/* 現在時刻ライン */}

                    <div className="flex-1 border-t-2 border-rose-500 h-0"></div>
                  </div>
                )}

                {/* 予定ブロック */}
                {blocks.map(block => {
                  const topY = timeToY(block.startTime);
                  const bottomY = timeToY(block.endTime);
                  if (topY === null || bottomY === null) return null;
                  const height = Math.max(bottomY - topY, 24);
                  const isSmall = height < 40;

                  return (
                    <div key={block.id} className={`absolute left-14 right-3 rounded-lg border shadow-sm overflow-hidden flex z-10 transition-all hover:shadow-md hover:z-20 ${block.color.bg}`}

                      <div className={`w-1 shrink-0 ${block.color.bar}`}></div>
                      <div className={`flex-1 px-2.5 ${isSmall ? 'py-0.5 flex items-center gap-2' : 'py-1.5'} overflow-hidden`}>

                          <>
                            <div className="text-[10px] font-mono font-bold text-slate-500">{block.startTime}–{block.endTime}</div>
                            <div className={`text-sm font-black leading-tight ${block.color.text}`}>{block.subject}</div>

                {/* 予定がない場合 */}
                {blocks.length === 0 && (
                  <div className="absolute inset-0 flex items-center justify-center">
                    <div className="text-center text-slate-400">
                      <div className="text-4xl mb-2">{isHoliday ? '🌴' : '📋'}</div>

              </div>
            </div>
          </div>
        </div>
      );
    };

    const Dashboard = ({ weeklyData, baseTemplate, todos, syllabusData, yearlyData, vacations, weeklySettings, templateSettings, onGoToWeekly, onGoToDate }) => {
      const today = new Date();
      const todayStr = formatDate(today);
      let dayIdx = today.getDay() - 1; if (dayIdx === -1) dayIdx = 6;

      const getDaySetting = (dateStr, dIdx) => {
        if (weeklySettings[dateStr]) return weeklySettings[dateStr];
        const isVac = vacations.some(v => dateStr >= v.start && dateStr <= v.end);
        if (isVac) return { type: 'holiday' };
        return templateSettings[dIdx] || DEFAULT_TEMPLATE_SETTINGS[dIdx];
      };

      const setting = getDaySetting(todayStr, dayIdx);
      const isHoliday = setting.type === 'holiday';

      const getCellData = (dateStr, periodId, dIdx) => {
        const wKey = `${dateStr}-${periodId}`;
        const tKey = `${dIdx}-${periodId}`;
        let base = baseTemplate[tKey] || { subject:'', memo:'' };
        if (periodId === 'event') {
          const [y,m,d] = dateStr.split('-').map(Number);
          const sy = m < 4 ? y - 1 : y;
          const ye = yearlyData[sy]?.[`${m}-${d}`];
          if (ye) base = { ...base, subject: ye };
        }
        if (setting.type === 'holiday' && (periodId.startsWith('p') || periodId === 'morning' || periodId === 'lunch')) {
          base = { subject:'', memo:'' };
        }
        const override = weeklyData[wKey];
        if (override && !override.useTemplate) {
          if (periodId === 'event' && !override.subject && base.subject) return { ...override, subject: base.subject };
          return override;
        }
        return base;
      };

      // Get current period
      const now = new Date();
      const nowMinutes = now.getHours() * 60 + now.getMinutes();
      let currentPeriod = null;
      let nextPeriod = null;
      if (!isHoliday) {
        const times = SCHEDULE_TIMES[setting.type];
        const periods = ['morning','p1','p2','p3','p4','lunch','p5','p6','afterschool'];
        for (const pid of periods) {
          const t = times[pid];
          if (!t || !t.start) continue;
          const [sh, sm] = t.start.split(':').map(Number);
          const endStr = t.end || t.start;
          const [eh, em] = endStr.split(':').map(Number);
          const startMin = sh * 60 + sm;
          const endMin = eh * 60 + em;
          if (nowMinutes >= startMin && nowMinutes < endMin) currentPeriod = pid;
          if (!nextPeriod && startMin > nowMinutes) nextPeriod = pid;
        }
      }

      const todaySchedule = ROWS.filter(r => r.id !== 'diary').map(r => {
        const data = getCellData(todayStr, r.id, dayIdx);
        const times = SCHEDULE_TIMES[setting.type];
        const time = times?.[r.id];
        return { ...r, data, time, isCurrent: r.id === currentPeriod, isNext: r.id === nextPeriod };
      }).filter(r => r.data?.subject || r.isCurrent);

      // Upcoming deadlines
      const upcomingTodos = todos.filter(t => !t.completed).sort((a,b) => {
        if (a.important && !b.important) return -1;

      // Syllabus progress
      const syllabusProgress = syllabusData.filter(s => s.type === 'auto' && s.units?.length > 0).map(s => {
        const totalHours = s.units.reduce((sum, u) => sum + u.hours, 0);
        let completed = 0;
        for (let i = 0; i < s.currentUnitIdx; i++) completed += s.units[i].hours;
        completed += s.currentHour - 1;
        return { name: s.name, progress: totalHours > 0 ? Math.round((completed / totalHours) * 100) : 0, current: s.units[s.currentUnitIdx]?.name || '完了' };
      });

      // Tomorrow / upcoming events
      const upcomingEvents = [];
      for (let i = 1; i <= 7; i++) {
        const d = new Date(today); d.setDate(d.getDate() + i);

      const greetingHour = now.getHours();

      return (

              {/* TODOリスト */}

                {upcomingTodos.length === 0 ? (
                  <div className="text-center py-8 text-slate-400"><div className="text-3xl mb-2">✨</div><div className="font-bold text-sm">すべて完了しています！</div></div>
                ) : (
                  <div className="space-y-1.5">
                    {upcomingTodos.map(t => {
                      const isOverdue = t.dueDate && t.dueDate < todayStr;

                        <div key={t.id} className={`flex items-start gap-2.5 px-3 py-2.5 rounded-xl ${isOverdue ? 'bg-rose-50/50 border border-rose-100' : isToday ? 'bg-amber-50/50 border border-amber-100' : 'hover:bg-slate-50'}`}>

                            <input type="time" value={tempStartTime} onChange={e=>setTempStartTime(e.target.value)} className="w-24 bg-white border border-slate-200 rounded-lg px-2 py-1.5 text-xs font-mono font-bold outline-none focus:border-blue-300" />
                            <span className="text-slate-300 font-bold">〜</span>
                            <input type="time" value={tempEndTime} onChange={e=>setTempEndTime(e.target.value)} className="w-24 bg-white border border-slate-200 rounded-lg px-2 py-1.5 text-xs font-mono font-bold outline-none focus:border-blue-300" />
                          </div>
                        )}
                        <input name="subject" value={tempSubject} onChange={e=>setTempSubject(e.target.value)} className="w-full text-xl font-black border-b-[3px] border-slate-100 focus:border-blue-400 outline-none py-2 text-slate-700 placeholder-slate-300 transition-colors" placeholder="活動内容・教科名" autoFocus />
                        
                        {!editingCell.isTemplate && editingCell.periodId.startsWith('p') && syllabusData.length > 0 && (
                          <div className="mt-4 bg-blue-50/30 p-4 rounded-xl border border-blue-100">
                            <div className="text-[11px] font-bold text-blue-700 mb-3">💡 ワンタップ入力</div>
                            <div className="flex flex-col gap-2.5 max-h-48 overflow-y-auto pr-1">
                              {syllabusData.map(subj => {
                                if(subj.type==='auto') {
                                  const unit=subj.units?.[subj.currentUnitIdx]; const isFinished=subj.units?.length>0&&!unit;
                                  const text=isFinished?`${subj.name}（単元終了）`:(unit?`${subj.name}（${unit.name} ${subj.currentHour}/${unit.hours}）`:subj.name);
                                  return (
                                    <div key={subj.id} className="flex items-center gap-2">
                                      <button type="button" onClick={()=>setTempSubject(text)} className="flex-1 bg-white border border-blue-200 text-blue-700 text-sm font-bold py-2.5 px-4 rounded-xl hover:bg-blue-50 text-left truncate transition-all active:scale-[0.98]">{text}</button>
                                      {!isFinished&&unit&&(
                                        <div className="flex bg-white border border-blue-200 rounded-xl overflow-hidden shrink-0">
                                          <button type="button" onClick={()=>adjustSyllabusManual(subj.id,-1)} className="px-4 py-2 text-blue-400 hover:text-blue-600 hover:bg-blue-50 font-bold text-lg">-</button>
                                          <div className="w-px bg-blue-100 my-1"></div>
                                          <button type="button" onClick={()=>adjustSyllabusManual(subj.id,1)} className="px-4 py-2 text-blue-400 hover:text-blue-600 hover:bg-blue-50 font-bold text-lg">+</button>
                                        </div>
                                      )}
                                    </div>
                                  );
                                } else {
                                  return (
                                    <div key={subj.id} className="flex flex-col gap-1.5">
                                      <button type="button" onClick={()=>setTempSubject(subj.name)} className="bg-white border border-teal-200 text-teal-700 text-sm font-bold py-2.5 px-4 rounded-xl hover:bg-teal-50 text-left transition-all active:scale-[0.98]">{subj.name}</button>
                                      {tempSubject.includes(subj.name) && subj.history?.length > 0 && (
                                        <div className="flex flex-wrap gap-2 pl-3 mt-1">{subj.history.map((h,hi) => <button type="button" key={hi} onClick={()=>setTempSubject(`${subj.name}（${h}）`)} className="text-xs font-bold bg-teal-50 hover:bg-teal-100 text-teal-700 px-3 py-1.5 rounded-lg border border-teal-200">{h}</button>)}</div>
                                      )}
                                    </div>
                                  );
                                }
                              })}
                            </div>
                            <div className="text-[10px] text-slate-400 font-bold mt-3">※ 自動カウント教科は保存で1時間進みます</div>
                          </div>
                        )}

                        {editingCell.periodId.startsWith('p')&&templateClasses.length>0&&(
                          <select defaultValue="" onChange={e=>{const si=e.target.value;if(si!==""){const t=templateClasses[si];setTempSubject(t.subject);if(t.memo)setTempMemo(t.memo);}e.target.value="";}}
                            className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold text-slate-600 outline-none focus:ring-4 focus:ring-blue-50 focus:border-blue-300 cursor-pointer appearance-none">
                            <option value="" disabled>💡 基本の時間割から選ぶ...</option>
                            {templateClasses.map((tc,idx) => <option key={idx} value={idx}>{tc.label} : {tc.subject}</option>)}
                          </select>
                        )}
                        <textarea name="memo" value={tempMemo} onChange={e=>setTempMemo(e.target.value)} rows="3" className="w-full text-sm font-bold border border-slate-200 rounded-xl p-4 focus:ring-4 focus:ring-blue-50 focus:border-blue-300 outline-none bg-slate-50/50 resize-none text-slate-600 placeholder-slate-400" placeholder="メモ..." />
                      </div>
                    )}
                  </form>
                </div>
                <div className="bg-white p-5 border-t border-slate-100 shrink-0 flex gap-3 justify-between">
                  <button type="button" onClick={() => { const emptyData = { subject:'', memo:'', startTime:'', endTime:'', events:[], handwriting:null }; handleSaveCell(emptyData); showToast('🧹 クリアしました'); }} className="px-4 py-3 rounded-xl bg-rose-50 hover:bg-rose-100 text-rose-500 font-bold text-sm border border-rose-200 transition-colors active:scale-95">🗑 クリア</button>
                  <div className="flex gap-3">
                    <button type="button" onClick={() => setEditingCell(null)} className="px-5 py-3 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-500 font-bold text-sm">キャンセル</button>
                    <button type="submit" form="edit-form" className="px-8 py-3 rounded-xl bg-blue-500 hover:bg-blue-600 text-white font-bold text-sm shadow-lg shadow-blue-200 active:scale-95 transition-all">保存</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* 手書き入力 */}
          {showHandwritingPad && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[90] flex flex-col p-4 sm:p-8 anim-fade-up no-print">
              <div className="bg-white rounded-2xl shadow-2xl flex-1 flex flex-col overflow-hidden">
                <div className="flex justify-between items-center p-5 bg-slate-50 border-b border-slate-200/60 shrink-0">
                  <div className="font-black text-slate-700 text-lg flex items-center gap-2">✏️ {handwritingMode==='quick'?'クイックメモ':'手書きメモ'}</div>
                  <div className="flex gap-3">
                    <button onClick={clearHandwriting} className="px-4 py-2 bg-white border border-slate-200 text-slate-500 hover:bg-slate-50 rounded-xl text-sm font-bold">クリア</button>
                    <button onClick={() => {setShowHandwritingPad(false);setHandwritingMode('cell');}} className="px-4 py-2 bg-slate-100 text-slate-500 hover:bg-slate-200 rounded-xl text-sm font-bold">戻る</button>
                    <button onClick={saveHandwriting} className="px-6 py-2 bg-teal-500 hover:bg-teal-600 text-white rounded-xl text-sm font-bold shadow-md active:scale-95 transition-all">決定</button>
                  </div>
                </div>
                <div className="flex-1 bg-slate-100 p-4 overflow-hidden flex items-center justify-center relative touch-none">
                  <canvas ref={canvasRef} width={800} height={600} className="bg-white rounded-xl shadow-lg w-full max-w-4xl h-auto aspect-[4/3] cursor-crosshair touch-none border border-slate-200"
                    onPointerDown={startDrawing} onPointerMove={draw} onPointerUp={endDrawing} onPointerCancel={endDrawing} onPointerOut={endDrawing} style={{touchAction:'none'}} />
                </div>
              </div>
            </div>
          )}

          {/* 日別タイムラインビュー */}
          {selectedDateDetails && (
            <DayTimelineView
              dateStr={selectedDateDetails.dateStr}
              dateObj={selectedDateDetails.dateObj}
              onClose={() => setSelectedDateDetails(null)}
              getCellData={getCellData}
              getDaySetting={getDaySetting}
              todos={todos}
              onGoToWeekly={() => { setCurrentWeekStart(getMonday(selectedDateDetails.dateObj)); setActiveTab('weekly'); setSelectedDateDetails(null); }}
            />
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<TeacherPlanner />);
  </script>
</body>
</html>
